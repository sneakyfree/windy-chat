name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_ENV: test
  WINDY_JWT_SECRET: ci-test-secret
  CHAT_API_TOKEN: ci-test-token
  CHAT_SERVICE_TOKEN: ci-test-service-token
  ETERNITAS_WEBHOOK_SECRET: ci-test-eternitas-secret

jobs:
  test-unit:
    name: Unit Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [onboarding, directory, push-gateway, backup, social, media, call-history, translation]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install shared deps
        run: cd services/shared && npm ci
      - name: Install ${{ matrix.service }} deps
        run: cd services/${{ matrix.service }} && npm ci
      - name: Test ${{ matrix.service }}
        run: cd services/${{ matrix.service }} && npm test

  test-unit-new:
    name: Unit Tests (${{ matrix.test }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - test: social-new
            file: tests/unit/test-social-new.js
            deps: social
          - test: onboarding-new
            file: tests/unit/test-onboarding-new.js
            deps: onboarding
          - test: shared
            file: tests/unit/test-shared.js
            deps: social
          - test: new-features
            file: tests/unit/test-new-features.js
            deps: social
          - test: eternitas-webhook
            file: tests/unit/test-eternitas-webhook.js
            deps: social
          - test: agent-provision
            file: tests/unit/test-agent-provision.js
            deps: onboarding
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install shared deps
        run: cd services/shared && npm ci
      - name: Install deps
        run: |
          cd services/${{ matrix.deps }} && npm ci
          cd ../directory && npm ci 2>/dev/null || true
      - name: Test ${{ matrix.test }}
        run: node --test ${{ matrix.file }}

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install all deps
        run: |
          cd services/shared && npm ci && cd ..
          for svc in onboarding directory push-gateway backup social translation media call-history; do
            cd $svc && npm ci && cd ..
          done
      - name: Run stress test (all 8 services)
        run: node --test tests/stress/test_full_mesh.js
      - name: Run full stack integration test
        run: node --test tests/integration/test_full_stack.js
      - name: Run agent onboarding integration test
        run: node --test tests/integration/test_agent_onboarding.js
      - name: Run unified login integration test
        run: node --test tests/integration/test_unified_login.js

  test-hardening:
    name: Hardening Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install all deps
        run: |
          cd services/shared && npm ci && cd ..
          for svc in onboarding directory push-gateway backup social translation media call-history; do
            cd $svc && npm ci && cd ..
          done
      - name: Run hardening tests
        run: |
          for f in tests/hardening/*.js; do
            echo "Running $f..."
            node --test "$f"
          done

  lint:
    name: Lint + Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check for syntax errors (all .js files)
        run: |
          for f in $(find services -name '*.js' -not -path '*/node_modules/*'); do
            node --check "$f" || exit 1
          done

  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        run: cd web && npm ci
      - name: TypeScript check
        run: cd web && npx tsc --noEmit
      - name: Build
        run: cd web && npm run build
      - name: Verify dist output
        run: |
          test -f web/dist/index.html || (echo "Missing dist/index.html" && exit 1)
          echo "Web app built successfully ($(du -sh web/dist | cut -f1))"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, build-web]
    steps:
      - uses: actions/checkout@v4
      - name: Build service images
        run: |
          for svc in onboarding directory push-gateway backup social translation media call-history; do
            echo "Building $svc..."
            docker build --build-arg SERVICE_DIR=$svc -t windy-$svc:ci services/
          done
      - name: Build web image
        run: docker build -t windy-web:ci web/
      - name: Verify images exist
        run: |
          for svc in onboarding directory push-gateway backup social translation media call-history web; do
            docker image inspect windy-$svc:ci > /dev/null 2>&1 || (echo "Missing image: windy-$svc" && exit 1)
          done
          echo "All 9 images built successfully"
