name: Deploy

# Auto-deploy windy-chat to the production EC2 (i-0f603361b88baa4c0,
# chat.windychat.ai) on every push to main.
#
# Model: rsync-from-runner (mirrors windy-mind PR #37). The runner checks out
# the code and rsyncs it to /opt/windy-chat (as root via sudo — the dir is
# root:root 0700), then rebuilds the stack on the host. This deliberately does
# NOT use `git pull` on the host — the host's in-tree git is root-owned and its
# remote can't pull, which is why prod silently went 8 days stale.
# rsync-from-runner is auth-independent.
#
# SAFETY — operator state that must NEVER be touched (all preserved by excludes
# or by living outside the repo dir):
#   - /opt/windy-chat/.env.production   (hand-curated; excluded below)
#   - /opt/windy-chat/secrets/          (APNs .p8 + FCM JSON, boot-guarded;
#                                        excluded below)
#   - /opt/windy-chat-data/             (Synapse/postgres/coturn data; OUTSIDE
#                                        /opt/windy-chat so rsync can't reach it)
# rsync --delete does not delete excluded paths. Verified by real --dry-run
# 2026-05-29 (venv excluded): 0 deletions; and the first catch-up deploy via
# this exact path confirmed .env.production + secrets/ byte-identical before/
# after, with postgres/redis/synapse/coturn left Running (only the node
# microservices recreated).
#
# Chat compose MUST use BOTH files + the env-file or coturn fails to resolve
# its image (see kit-army-config feedback_windy_chat_compose_invocation).
#
# Deploys ONLY the live service set (onboarding directory push-gateway backup
# social media agent-roster). The compose also defines call-history + web,
# which have been build-broken since 2026-03-31 and which prod has never run;
# a full `up --build` fails on them. Fixing/removing those is separate follow-up
# (tracked in the SoU). synapse/coturn/dbs are upstream images, left running.
#
# Graceful degradation: if DEPLOY_* secrets aren't set, skip cleanly instead of
# failing every push.

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'web/**'
      - 'docker-compose.yml'
      - 'docker-compose.prod.yml'
      - 'deploy/**'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - name: Check auto-deploy is configured
        id: check
        env:
          HAS_HOST: ${{ secrets.DEPLOY_HOST != '' }}
          HAS_USER: ${{ secrets.DEPLOY_USER != '' }}
          HAS_KEY:  ${{ secrets.DEPLOY_KEY != '' }}
        run: |
          if [[ "$HAS_HOST" == "true" && "$HAS_USER" == "true" && "$HAS_KEY" == "true" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "✅ Auto-deploy secrets configured; will deploy this commit."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DEPLOY_HOST/USER/KEY not configured; auto-deploy skipped."
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.configured == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rsync code to production
        run: |
          # /opt/windy-chat is root:root 0700 (it holds the boot-guarded
          # APNs/FCM secrets), so the deploy user cannot write it directly —
          # rsync MUST run as root on the far end via --rsync-path="sudo rsync"
          # (the deploy user has passwordless sudo). Single './' source +
          # --delete + explicit excludes; NEVER add the operator paths below to
          # the source tree or --delete would reconcile them away on the host.
          # Verified by real --dry-run 2026-05-29: with venv excluded, 0
          # deletions; .env.production + secrets/ + /opt/windy-chat-data (which
          # lives OUTSIDE this dir) are all preserved.
          rsync -az --delete --rsync-path="sudo rsync" \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='venv/' \
            --exclude='.venv/' \
            --exclude='.env' \
            --exclude='.env.production' \
            --exclude='.env.production.*' \
            --exclude='secrets/' \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/windy-chat/"

      - name: Deploy on production host + verify /version
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "COMMIT_SHA='$GIT_SHA' bash -s" <<'EOF'
            set -uo pipefail
            cd /opt/windy-chat
            export COMMIT_SHA
            export BUILD_TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            # Deploy ONLY the live service set. The full compose also defines
            # call-history + web, whose Dockerfiles have been build-broken since
            # 2026-03-31 (call-history's `COPY package*.json` doesn't match its
            # `./services` context) and which prod has never run — a full
            # `up --build` therefore fails on them and would red every push.
            # These 7 are exactly the custom-built containers prod runs; synapse,
            # coturn, synapse-db, synapse-redis are upstream images left as-is.
            # BOTH compose files + --env-file required (coturn image + prod overrides).
            LIVE="onboarding directory push-gateway backup social media agent-roster"
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production"
            sudo COMMIT_SHA="$COMMIT_SHA" BUILD_TIMESTAMP="$BUILD_TIMESTAMP" $COMPOSE build $LIVE
            # --no-deps so we recreate ONLY the live services; synapse + dbs +
            # coturn keep running (no Matrix/session disruption, no data risk).
            sudo COMMIT_SHA="$COMMIT_SHA" BUILD_TIMESTAMP="$BUILD_TIMESTAMP" $COMPOSE up -d --no-deps $LIVE
            # MF1 /version verification — onboarding binds host 127.0.0.1:8101.
            # Poll until the recreated container is up (build cache -> fast race).
            DEPLOYED=""
            for i in $(seq 1 30); do
              BODY=$(curl -s --max-time 5 http://127.0.0.1:8101/version || true)
              if [[ -n "$BODY" ]]; then
                DEPLOYED=$(printf '%s' "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('commit_sha','')[:7])" 2>/dev/null || true)
              fi
              [[ -n "$DEPLOYED" ]] && break
              sleep 2
            done
            if [[ "$DEPLOYED" == "${COMMIT_SHA:0:7}" ]]; then
              echo "✅ Deploy verified: /version shows $DEPLOYED"
            else
              echo "❌ Verification failed: /version shows '$DEPLOYED', expected '${COMMIT_SHA:0:7}'"
              exit 1
            fi
          EOF
