# Windy Chat — production overlay
#
# Compose project name: `windy-chat` (declared below).
#
# This OVERRIDES the dev declaration in docker-compose.yml (`name:
# windychat-dev`) so production deploys land on the project name that
# the live chat EC2 (i-0f603361b88baa4c0) has actually been running
# under since 2026-04-19 — without forcing a destructive rename of
# the live containers. Dev contributors invoking JUST docker-compose.yml
# keep getting `windychat-dev`; production invocations (always include
# this overlay per the command below) get `windy-chat`.
#
# Closes the ADR-046 violation surfaced by tonight's branch hygiene
# audit (kit-army-config/docs/ecosystem-branch-hygiene-audit-2026-05-17.md
# §7) — previously deploys needed an explicit `-p windy-chat` workaround
# to avoid spinning up a parallel `windychat-dev` stack alongside the
# live one.
name: windy-chat

#
# Stacks on top of docker-compose.yml:
#   docker compose \
#     -f docker-compose.yml -f docker-compose.prod.yml \
#     --env-file /opt/windy-chat/.env.production \
#     up -d
#
# ALWAYS pass --env-file explicitly — docker compose resolves
# ${VAR:-default} at shell time, NOT from the container's env_file.
# Without --env-file you get dev defaults silently (Phase-2 bug #3).
#
# `!override` + new list = full replacement; bare lists APPEND (Phase-2
# bug #2). Use !override on every list that must not merge: ports, env
# vars we want to blank out, networks.

services:

  # ── synapse-db: stays running idle (Phase-2 bug #6) ────────────
  # Synapse's `depends_on: synapse-db: service_healthy` would block
  # forever if we scaled this container to 0. Keeping it idle costs
  # ~50 MB RAM; the real data store is RDS via DATABASE_URL below.
  synapse-db:
    restart: unless-stopped

  # ── Synapse Matrix homeserver — production config ──────────────
  synapse:
    # Bind only to loopback — nginx terminates TLS on :443
    ports: !override
      - "127.0.0.1:8008:8008"
    environment:
      SYNAPSE_SERVER_NAME: ${SYNAPSE_SERVER_NAME:-chat.windychat.ai}
      SYNAPSE_REPORT_STATS: "no"
      # RDS backs Synapse in prod. The authoritative DB config is
      # in homeserver.yaml (mounted from /opt/windy-chat-data/synapse);
      # this env var is informational only.
      SYNAPSE_DATABASE_URL: ${SYNAPSE_DATABASE_URL:?SYNAPSE_DATABASE_URL is required}
      # windy_registration + windy_push_bus are bind-mounted at
      # /data/modules/ from the repo — PYTHONPATH makes them importable
      # by Synapse's module loader (`module: windy_registration.WindyRegistrationModule`
      # in homeserver.yaml).
      PYTHONPATH: /data/modules
    # Full-replace the base compose's volumes list — the base bind-mounts
    # the DEV homeserver.yaml (server_name=chat.windychat.ai) on top of
    # /data/homeserver.yaml which would shadow our rendered prod config.
    # The prod data lives on the host at /opt/windy-chat-data/synapse
    # (rendered homeserver.yaml + signing.key + log config).
    volumes: !override
      - /opt/windy-chat-data/synapse:/data
      - ./deploy/synapse/windy_registration.py:/data/modules/windy_registration.py:ro
      - ./deploy/synapse/windy_push_bus.py:/data/modules/windy_push_bus.py:ro
    restart: unless-stopped

  # ── nginx: disabled in prod overlay; host nginx handles TLS ────
  nginx:
    profiles: ["disabled"]

  # ── Node services ──────────────────────────────────────────────
  # All four bind to loopback only — host nginx terminates and proxies.
  onboarding:
    ports: !override
      - "127.0.0.1:8101:8101"
    environment:
      NODE_ENV: production
      COMMIT_SHA: ${COMMIT_SHA:-}
      BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      WINDY_ACCOUNT_SERVER_URL: ${WINDY_ACCOUNT_SERVER_URL:?set via .env.production}
      WINDY_JWKS_URL: ${WINDY_JWKS_URL:?set via .env.production}
      WINDY_IDENTITY_WEBHOOK_SECRET: ${WINDY_IDENTITY_WEBHOOK_SECRET:?}
      ETERNITAS_WEBHOOK_SECRET: ${ETERNITAS_WEBHOOK_SECRET:?}
      SYNAPSE_URL: http://synapse:8008
      SYNAPSE_REGISTRATION_SECRET: ${SYNAPSE_REGISTRATION_SECRET:?}
      SYNAPSE_SERVER_NAME: ${SYNAPSE_SERVER_NAME:-chat.windychat.ai}
      PUSH_BUS_URL: http://push-gateway:8103
      PUSH_BUS_TOKEN: ${PUSH_BUS_TOKEN:?}
    restart: unless-stopped

  directory:
    ports: !override
      - "127.0.0.1:8102:8102"
    environment:
      NODE_ENV: production
      COMMIT_SHA: ${COMMIT_SHA:-}
      BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      WINDY_JWKS_URL: ${WINDY_JWKS_URL:?}
      ETERNITAS_URL: ${ETERNITAS_URL:?}
    restart: unless-stopped

  push-gateway:
    ports: !override
      - "127.0.0.1:8103:8103"
    # APNs .p8 + FCM service-account JSON are bind-mounted from the
    # host into the container at /secrets/. Env vars below reference
    # the container-side path (e.g. APNS_KEY_PATH=/secrets/AuthKey_*.p8).
    # Without this mount the FCM/APNs init code reads the files inside
    # the container, fails with ENOENT, and the providers stay in
    # "stubbed" mode — verified 2026-05-17 (stub mode persisted 4+
    # days after secrets were placed on host but volume omitted).
    volumes:
      - /opt/windy-chat/secrets:/secrets:ro
    environment:
      NODE_ENV: production
      COMMIT_SHA: ${COMMIT_SHA:-}
      BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      WINDY_JWKS_URL: ${WINDY_JWKS_URL:?}
      PUSH_BUS_TOKEN: ${PUSH_BUS_TOKEN:?}
      FIREBASE_SERVICE_ACCOUNT: ${FIREBASE_SERVICE_ACCOUNT:-}
      APNS_KEY_PATH: ${APNS_KEY_PATH:-}
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
    restart: unless-stopped

  backup:
    ports: !override
      - "127.0.0.1:8104:8104"
    environment:
      NODE_ENV: production
      COMMIT_SHA: ${COMMIT_SHA:-}
      BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:?}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:?}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:?}
      R2_BUCKET: ${R2_BUCKET:-windychat-backups}
    restart: unless-stopped

  hub:
    ports: !override
      - "127.0.0.1:8109:8109"
    environment:
      NODE_ENV: production
      COMMIT_SHA: ${COMMIT_SHA:-}
      BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      WINDY_ACCOUNT_SERVER_URL: ${WINDY_ACCOUNT_SERVER_URL:?set via .env.production}
      WINDY_JWKS_URL: ${WINDY_JWKS_URL:?set via .env.production}
    restart: unless-stopped

  # ── Telegram bridge (Hub Mode) — prod state on the host, like Synapse ──
  # Bridge state (config.yaml, SQLite DB, MTProto session material) lives
  # OUTSIDE /opt/windy-chat so the rsync deploy can never touch it.
  bridge-telegram:
    volumes: !override
      - /opt/windy-chat-data/bridges/telegram:/data
    restart: unless-stopped


  bridge-slack:
    volumes: !override
      - /opt/windy-chat-data/bridges/slack:/data
    restart: unless-stopped

  bridge-whatsapp:
    volumes: !override
      - /opt/windy-chat-data/bridges/whatsapp:/data
    restart: unless-stopped

  # ── Coturn — VoIP NAT traversal ────────────────────────────────
  # Host-network mode so Coturn can see real client source IPs (required
  # for STUN reflexive candidate discovery).
  #
  # SG ingress required (Wave 14 doc update — TCP 5349 is new):
  #   - UDP 3478   (STUN + plain TURN)
  #   - TCP 3478   (plain TURN over TCP — for UDP-blocked networks)
  #   - TCP 5349   (TURN over TLS — required for the `turns:` URI Synapse
  #                 advertises in /_matrix/client/r0/voip/turnServer)
  #   - UDP/TCP 49152–65535  (relay port range, per turnserver.conf)
  #
  # Custom entrypoint renders deploy/synapse/turnserver.conf's template
  # placeholders with values from .env.production, then exec's
  # turnserver. See deploy/synapse/coturn-entrypoint.sh — introduced in
  # Wave 14 to replace the compiled-in defaults that shipped in Phase 4.
  #
  # Certs are refreshed from Let's Encrypt by
  # deploy/aws/phase4/setup-coturn-certs.sh (wire into certbot's
  # --deploy-hook to survive renewals).
  coturn:
    network_mode: host
    ports: !override []
    # Full-replace the base compose's volumes: the dev stack bind-mounts
    # turnserver.conf into /etc/turnserver.conf directly, but prod wants
    # the templated flow + read-only cert dir.
    volumes: !override
      - ./deploy/synapse/turnserver.conf:/etc/turnserver.conf.template:ro
      - ./deploy/synapse/coturn-entrypoint.sh:/usr/local/bin/coturn-entrypoint.sh:ro
      - /opt/windy-chat-data/coturn/certs:/etc/coturn-certs:ro
      - /var/log/windy-chat/coturn:/var/log/turnserver
    entrypoint: ["/bin/sh", "/usr/local/bin/coturn-entrypoint.sh"]
    command: !override []
    environment:
      COTURN_SHARED_SECRET: ${COTURN_SHARED_SECRET:?set via .env.production}
      COTURN_REALM: ${COTURN_REALM:-chat.windychat.ai}
      COTURN_EXTERNAL_IP: ${COTURN_EXTERNAL_IP:?set to the EC2 EIP (public/private for 1:1 NAT)}
    restart: unless-stopped
