version: '3.8'

# Monitoring stack for Windy Chat (Synapse homeserver)
# Run from deploy/monitoring/:
#   docker-compose up -d
#
# Expects the Synapse stack network to be reachable. Uses the default
# bridge network with external_links, or override network_mode as needed.

services:
  # ── Prometheus ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: windy-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'           # allows POST /-/reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Grafana ──────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.1
    container_name: windy-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-windychat}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  prometheus_data:
  grafana_data:

# To connect to the Synapse stack's network, either:
#   1. Run both compose files with the same --project-name, or
#   2. Uncomment below and set the network name to match the Synapse stack:
# networks:
#   default:
#     external:
#       name: synapse_default
