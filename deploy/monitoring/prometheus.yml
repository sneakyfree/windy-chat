global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # ── Prometheus self-monitoring ─────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── Synapse homeserver metrics ─────────────────────────────────
  # Synapse exposes Prometheus metrics on port 9000 when enabled in
  # homeserver.yaml:
  #   enable_metrics: true
  #   listeners:
  #     - port: 9000
  #       type: metrics
  #       bind_addresses: ['0.0.0.0']
  - job_name: "synapse"
    metrics_path: "/_synapse/metrics"
    static_configs:
      - targets: ["synapse:9000"]
        labels:
          instance: "windy-synapse"

  # ── PostgreSQL (optional — requires postgres_exporter sidecar) ─
  # Uncomment if you add postgres_exporter to the Synapse stack.
  # - job_name: "postgres"
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]

  # ── Redis (optional — requires redis_exporter sidecar) ─────────
  # - job_name: "redis"
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]
