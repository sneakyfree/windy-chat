# Windy Chat — Nginx Reverse Proxy for Synapse
# K1.1.4: DNS & SSL (DNA Strand K)
#
# Routes:
#   /_matrix/client/* → Synapse client API
#   /.well-known/matrix/* → Discovery endpoints
#   SSL termination via Let's Encrypt

# Rate limiting
limit_req_zone $binary_remote_addr zone=matrix_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=matrix_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=chat_api:10m rate=10r/s;

upstream synapse_backend {
    server synapse:8008;
}

# ── HTTP → HTTPS Redirect ──
server {
    listen 80;
    server_name chat.windychat.ai;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Server ──
server {
    listen 443 ssl http2;
    server_name chat.windychat.ai;

    # SSL — Let's Encrypt certificates
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload size (100MB for media sharing — K4)
    client_max_body_size 100m;

    # ── .well-known discovery endpoints ──
    # These allow Matrix clients to discover the homeserver automatically.

    location /.well-known/matrix/server {
        default_type application/json;
        return 200 '{"m.server": "chat.windychat.ai:443"}';
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    }

    location /.well-known/matrix/client {
        default_type application/json;
        return 200 '{"m.homeserver": {"base_url": "https://chat.windychat.ai"}, "m.identity_server": {"base_url": "https://chat.windychat.ai"}}';
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    }

    # ── Matrix Client API ──
    location /_matrix/client {
        proxy_pass http://synapse_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limiting
        limit_req zone=matrix_api burst=30 nodelay;

        # WebSocket support (for /sync long-polling)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── Matrix Login (stricter rate limiting) ──
    location /_matrix/client/v3/login {
        proxy_pass http://synapse_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Strict rate limiting for login endpoint
        limit_req zone=matrix_login burst=3 nodelay;
    }

    # ── Matrix Media API ──
    location /_matrix/media {
        proxy_pass http://synapse_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Large uploads for media (100MB — K4)
        client_max_body_size 100m;
        proxy_read_timeout 120s;

        limit_req zone=matrix_api burst=20 nodelay;
    }

    # ── Matrix Key Backup & Cross-Signing (K7) ──
    location /_matrix/client/v3/room_keys {
        proxy_pass http://synapse_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=matrix_api burst=10 nodelay;
    }

    location /_matrix/client/v3/keys {
        proxy_pass http://synapse_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=matrix_api burst=20 nodelay;
    }

    # ── Synapse Admin API (restricted) ──
    location /_synapse/admin {
        # Only accessible from internal network
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;

        proxy_pass http://synapse_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health check ──
    location /health {
        proxy_pass http://synapse_backend/health;
    }

    # ── Microservice Reverse Proxy ──
    # Route /api/v1/chat/* to the appropriate microservice.
    # In production, all services are behind this single nginx instance.

    # ── Onboarding Service (K2) ──
    location /api/v1/chat/verify {
        proxy_pass http://onboarding:8101;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=chat_api burst=20 nodelay;
    }
    location /api/v1/chat/profile {
        proxy_pass http://onboarding:8101;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=chat_api burst=20 nodelay;
    }
    location /api/v1/chat/pair {
        proxy_pass http://onboarding:8101;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=chat_api burst=20 nodelay;
    }
    location /api/v1/chat/provision {
        proxy_pass http://onboarding:8101;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=chat_api burst=20 nodelay;
    }
    location /api/v1/onboarding {
        proxy_pass http://onboarding:8101;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=chat_api burst=20 nodelay;
    }
    location /api/v1/chat/agent-room {
        proxy_pass http://onboarding:8101;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=chat_api burst=10 nodelay;
    }

    # ── Directory Service (K3) ──
    location /api/v1/chat/directory {
        proxy_pass http://directory:8102;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=chat_api burst=20 nodelay;
    }

    # ── Push Gateway (K6) ──
    location /api/v1/chat/push {
        proxy_pass http://push-gateway:8103;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=chat_api burst=20 nodelay;
    }

    # ── Backup Service (K8) ──
    location /api/v1/chat/backup {
        proxy_pass http://backup:8104;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100m;
        limit_req zone=chat_api burst=10 nodelay;
    }

    # ── Room Management (group creation, invites) ──
    location /api/v1/rooms {
        proxy_pass http://onboarding:8101;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=chat_api burst=10 nodelay;
    }

    # ── Eternitas Webhook (receives passport lifecycle events) ──
    location /api/v1/webhooks/eternitas {
        proxy_pass http://social:8105;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=chat_api burst=5 nodelay;
    }

    # ── Social Service (K10) ──
    location /api/v1/social {
        proxy_pass http://social:8105;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=chat_api burst=30 nodelay;
    }

    # ── Translation Service (K9) ──
    location /api/v1/translate {
        proxy_pass http://translation:8106;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=chat_api burst=20 nodelay;
    }

    # ── Media Service (K4) ──
    location /api/v1/media {
        proxy_pass http://media:8107;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
        limit_req zone=chat_api burst=20 nodelay;
    }

    # ── Call History Service (K5) ──
    location /api/v1/calls {
        proxy_pass http://call-history:8108;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=chat_api burst=20 nodelay;
    }

    # Default — deny everything else
    location / {
        return 404;
    }
}
