# Windy Chat — Coturn configuration (prod)
#
# Binds STUN/TURN on 3478 (UDP+TCP) and TURN-over-TLS on 5349 (TCP).
# Authentication is HMAC-timed-credential via `use-auth-secret` so the
# Matrix /_matrix/client/r0/voip/turnServer endpoint can hand out
# short-lived usernames signed by `static-auth-secret`.
#
# Environment variables substituted at container start
# (deploy/synapse/coturn-entrypoint.sh — see docker-compose.prod.yml):
#
#   COTURN_SHARED_SECRET   — shared with Synapse (`turn_shared_secret`
#                            in homeserver.yaml). Used to verify the
#                            HMAC credentials Synapse hands out.
#   COTURN_REALM           — "chat.windychat.ai" in production.
#   COTURN_EXTERNAL_IP     — the public EIP clients reach; coturn uses
#                            this to compose reflexive/relay candidates
#                            for peers on the other side of NAT. When
#                            behind 1:1 NAT (EC2 + EIP) the syntax is
#                            `PUBLIC_IP/PRIVATE_IP`.
#
# Historical: /opt/windy-chat/deploy/synapse/turnserver.conf was empty
# from Phase 4 boot until Wave 14 — coturn ran with compiled-in
# defaults, advertised `turns:chat.windychat.ai:5349?transport=tcp`
# via Synapse, and had no listener on 5349. Wave 13 Phase 4 smoke P1-2.

# ── Ports ────────────────────────────────────────────────────────
listening-port=3478
tls-listening-port=5349

# ── Relay candidate port range (must match SG ingress 49152-65535) ─
min-port=49152
max-port=65535

# ── Authentication ───────────────────────────────────────────────
# Matrix uses the HMAC-timed-credential scheme — Synapse computes a
# username of the form `<expiry>:<user>` and signs it with the shared
# secret. Coturn verifies by recomputing the HMAC with the same
# secret. `use-auth-secret` implies `lt-cred-mech`.
use-auth-secret
static-auth-secret=__COTURN_SHARED_SECRET__

# Realm — sent in auth challenges; doesn't have to be a real DNS name
# but aligning with the server's public hostname is conventional.
realm=__COTURN_REALM__

# ── NAT posture ──────────────────────────────────────────────────
# Tell coturn the EIP so it can advertise the right reflexive/relay
# candidates. `PUBLIC/PRIVATE` handles 1:1 NAT (EC2 behind an EIP).
external-ip=__COTURN_EXTERNAL_IP__
fingerprint
no-multicast-peers
no-loopback-peers
no-cli

# ── TLS (for turns:5349/tcp) ─────────────────────────────────────
# Let's Encrypt certs bind-mounted read-only from the host at
# /etc/letsencrypt. Coturn reads these at startup; if they rotate on
# disk (certbot renewal runs monthly), send SIGUSR2 or restart the
# container to pick up the new fullchain.
# Certs are bind-mounted as a flat copy at /etc/coturn-certs — we can't
# mount /etc/letsencrypt directly because archive/ is mode 0700 and
# coturn runs as nobody. The host-side copy is done by
# `deploy/aws/phase4/setup-coturn-certs.sh` (re-run it after every
# certbot renewal — or wire it into a certbot --deploy-hook).
cert=/etc/coturn-certs/fullchain.pem
pkey=/etc/coturn-certs/privkey.pem
# Diffie-Hellman params; falls back to compiled-in defaults if missing.
# dh-file=/etc/coturn-certs/ssl-dhparams.pem
cipher-list="HIGH:!aNULL:!MD5:!3DES"
no-tlsv1
no-tlsv1_1

# ── Hygiene ──────────────────────────────────────────────────────
# Matrix federation doesn't need guest TURN; Synapse has
# `turn_allow_guests: false` in homeserver.prod.yaml and we mirror it.
no-stdout-log
simple-log
log-file=/var/log/turnserver/turn.log
verbose

# Stale-nonce prevents replay of expired credentials; default 600s
# is fine for Matrix (credentials are already time-scoped).
stale-nonce=600

# Deny requests to link-local/loopback peers — no packet can escape
# to the host's loopback stack or AWS metadata service.
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.0.2.0-192.0.2.255
denied-peer-ip=192.88.99.0-192.88.99.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=203.0.113.0-203.0.113.255
denied-peer-ip=240.0.0.0-255.255.255.255

# Performance knobs — modest box (t3.medium); these keep a single
# `turnserver` process responsive under light chat load.
total-quota=100
user-quota=12
