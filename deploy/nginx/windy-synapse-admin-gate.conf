# Wave C — Synapse admin gateway-token map.
#
# Goes inside the host nginx `http {}` block (NOT inside a server{}):
#   include /etc/nginx/windy-synapse-admin-gate.conf;
#
# This file is a TEMPLATE — the literal token replaces __TOKEN__ at
# deploy time. See deploy/nginx/INSTALL.md §Wave-C for the exact
# command. Empty token → the location block in chat.windychat.ai.conf
# returns 503, so a misconfigured deploy fails closed.
#
# Rotation = rewrite this file + `sudo nginx -t && sudo systemctl reload nginx`.
# Synapse access tokens themselves rotate independently in Synapse's
# DB (HMAC-SHA256 of the macaroon secret); this gate token is purely
# the gateway-level "are you in the allow-list" check.

map $arg_unused $synapse_admin_gateway_token {
    default "__TOKEN__";
}
