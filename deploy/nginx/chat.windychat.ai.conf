# Windy Chat — chat.windychat.ai (Phase 4)
# Host nginx terminates TLS on :443 and reverse-proxies to the 4 Node
# services + Synapse on the compose network (loopback bound).

# Upstream defs so the proxy_pass blocks stay readable.
# (nginx runs on host; containers bind to 127.0.0.1:8008/8101/.../8108)

server {
    listen 80;
    listen [::]:80;
    server_name chat.windychat.ai;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2 ipv6only=on;
    server_name chat.windychat.ai;

    ssl_certificate     /etc/letsencrypt/live/chat.windychat.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.windychat.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100M;

    # Matrix well-known delegation (federation + client autodiscover)
    location = /.well-known/matrix/server {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        return 200 '{"m.server":"chat.windychat.ai:443"}';
    }
    location = /.well-known/matrix/client {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        return 200 '{"m.homeserver":{"base_url":"https://chat.windychat.ai"}}';
    }

    # Matrix client + federation → Synapse on :8008
    location /_matrix/ {
        proxy_pass http://127.0.0.1:8008;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    location /_synapse/client/ {
        proxy_pass http://127.0.0.1:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Wave C — Synapse admin API exposure gated by a service token.
    #
    # Background: the windy-connect orchestrator Worker needs to call
    # /_synapse/admin/v2/users/... (create user) and
    # /_synapse/admin/v1/users/.../login (mint access token) during the
    # magic-link pair flow. Before this block these endpoints returned
    # 404 at the edge (only /_synapse/client/ was proxied through), even
    # though they worked against 127.0.0.1:8008 from inside the EC2.
    #
    # Auth model:
    #   - nginx requires `X-Windy-Connect-Admin-Token` matching the
    #     value baked into the Worker secret + this map below. This is
    #     a gateway-level gate; without it nginx returns 403 before any
    #     request reaches Synapse. Stops external scanners from probing
    #     admin endpoints even if Synapse misconfigures auth.
    #   - The caller ALSO sends `Authorization: Bearer <synapse_access_token>`
    #     (the access_token minted for @windy-connect-admin2). Synapse
    #     itself validates this. Two-layer defense.
    #
    # If the token map below is empty/unset, the block returns 503 so a
    # misconfigured deploy can't accidentally open admin to the internet.
    location /_synapse/admin/ {
        # The expected token lives in $synapse_admin_gateway_token —
        # populated from a map in the `http {}` block via
        # `deploy/nginx/windy-synapse-admin-gate.conf` (see SUBSTRATE.md).
        # If the include is missing or the var is empty, return 503.
        if ($synapse_admin_gateway_token = "") {
            return 503 '{"error":"synapse_admin_gateway_unconfigured"}';
        }
        if ($http_x_windy_connect_admin_token != $synapse_admin_gateway_token) {
            return 403 '{"error":"forbidden"}';
        }
        # Strip the gateway token before forwarding — Synapse doesn't
        # need it and we don't want it appearing in Synapse logs.
        proxy_set_header X-Windy-Connect-Admin-Token "";
        proxy_pass http://127.0.0.1:8008;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # Synapse admin calls (esp. user creation + login) are
        # CPU-light but the homeserver can be slow under load — keep
        # the same generous timeout as the /_matrix/ block.
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Onboarding (port 8101) — unified-login, webhooks, provision, agent-room
    location /api/v1/onboarding/    { proxy_pass http://127.0.0.1:8101; include /etc/nginx/windy-proxy-headers.conf; }
    location /api/v1/webhooks/      { proxy_pass http://127.0.0.1:8101; include /etc/nginx/windy-proxy-headers.conf; }
    location /api/v1/chat/profile   { proxy_pass http://127.0.0.1:8101; include /etc/nginx/windy-proxy-headers.conf; }
    location /api/v1/chat/provision { proxy_pass http://127.0.0.1:8101; include /etc/nginx/windy-proxy-headers.conf; }
    location /api/v1/chat/verify    { proxy_pass http://127.0.0.1:8101; include /etc/nginx/windy-proxy-headers.conf; }
    location /api/v1/chat/pair      { proxy_pass http://127.0.0.1:8101; include /etc/nginx/windy-proxy-headers.conf; }
    location /api/v1/chat/agent-room { proxy_pass http://127.0.0.1:8101; include /etc/nginx/windy-proxy-headers.conf; }

    # Directory (8102) / Push gateway (8103) / Backup (8104)
    location /api/v1/chat/directory/ { proxy_pass http://127.0.0.1:8102; include /etc/nginx/windy-proxy-headers.conf; }
    location /api/v1/push/           { proxy_pass http://127.0.0.1:8103; include /etc/nginx/windy-proxy-headers.conf; }
    location /api/v1/chat/push/      { proxy_pass http://127.0.0.1:8103; include /etc/nginx/windy-proxy-headers.conf; }
    location /api/v1/backup/         { proxy_pass http://127.0.0.1:8104; include /etc/nginx/windy-proxy-headers.conf; }


    # MF1 — /version (deployment identity, no auth, no DB)
    location = /version {
        proxy_pass http://127.0.0.1:8101/version;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

        # Fallback
    location / {
        return 404 '{"error":"not found"}';
        default_type application/json;
    }
}
