# ── Windy Chat Backend — Full Stack ──
# Usage: docker compose up
# Brings up Synapse + PostgreSQL + Redis + Coturn + all Node.js services + nginx
#
# Explicit project name per ADR-046 (compose project naming discipline).
# Local-dev base; the prod overlay (docker-compose.prod.yml) layers on top.
name: windychat-dev

services:

  # ════════════════════════════════════════
  #  Infrastructure
  # ════════════════════════════════════════

  # ── PostgreSQL (Synapse database) ──
  synapse-db:
    image: postgres:16-alpine
    container_name: windy-synapse-db
    environment:
      POSTGRES_DB: synapse
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: ${SYNAPSE_DB_PASSWORD:-windy_dev_pg}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - synapse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Redis (Synapse workers + onboarding OTP store) ──
  synapse-redis:
    image: redis:7-alpine
    container_name: windy-synapse-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - synapse_redis:/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Coturn TURN Server (VoIP NAT traversal) ──
  coturn:
    image: coturn/coturn:latest
    container_name: windy-coturn
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"
      - "49152-49200:49152-49200/udp"
    volumes:
      - ./deploy/synapse/turnserver.conf:/etc/turnserver.conf:ro
    command: ["-c", "/etc/turnserver.conf"]
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  # ════════════════════════════════════════
  #  Synapse (Matrix Homeserver)
  # ════════════════════════════════════════

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: windy-synapse
    ports:
      - "8008:8008"
    environment:
      - SYNAPSE_CONFIG_PATH=/data/homeserver.yaml
      - SYNAPSE_DB_PASSWORD=${SYNAPSE_DB_PASSWORD:-windy_dev_pg}
    volumes:
      - synapse_data:/data
      - ./deploy/synapse/homeserver.yaml:/data/homeserver.yaml:ro
      - ./deploy/synapse/windy_registration.py:/data/modules/windy_registration.py:ro
    depends_on:
      synapse-db:
        condition: service_healthy
      synapse-redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://localhost:8008/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G

  # ════════════════════════════════════════
  #  Nginx (Reverse Proxy / TLS Termination)
  # ════════════════════════════════════════

  nginx:
    build:
      context: ./deploy
      dockerfile: nginx/Dockerfile
    container_name: windy-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/synapse/nginx.conf:/etc/nginx/conf.d/windy-chat.conf:ro
      - nginx_certs:/etc/nginx/certs:ro
      - nginx_acme:/var/www/certbot:ro
    depends_on:
      synapse:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M

  # ════════════════════════════════════════
  #  Node.js Microservices
  # ════════════════════════════════════════

  # ── Onboarding (K2) — Phone/email OTP, profile, QR pairing, Matrix provisioning ──
  onboarding:
    build:
      context: ./services
      dockerfile: onboarding/Dockerfile
      args:
        COMMIT_SHA: ${COMMIT_SHA:-}
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-}
    container_name: windy-onboarding
    ports:
      - "127.0.0.1:8101:8101"
      # host.docker.internal path for cross-stack S2S (account-server et al)
      - "172.17.0.1:8101:8101"
    volumes:
      - onboarding_data:/app/service/data
    environment:
      PORT: 8101
      NODE_ENV: ${NODE_ENV:-development}
      REDIS_URL: redis://synapse-redis:6379
      SYNAPSE_URL: http://synapse:8008
      SYNAPSE_REGISTRATION_SECRET: ${SYNAPSE_REGISTRATION_SECRET:-windy_dev_reg_secret}
      WINDY_ACCOUNT_SERVER_URL: ${WINDY_ACCOUNT_SERVER_URL:-http://host.docker.internal:8098}
      WINDY_JWT_SECRET: ${WINDY_JWT_SECRET:-dev-secret-change-me}
      CHAT_API_TOKEN: ${CHAT_API_TOKEN:-}
      CHAT_SERVICE_TOKEN: ${CHAT_SERVICE_TOKEN:-}
      SYNAPSE_ADMIN_TOKEN: ${SYNAPSE_ADMIN_TOKEN:-}
      # ADR-WA-001 — hatch-funnel telemetry (owner/agent chat provisioned).
      # Onboarding has its own emitter token, distinct from the roster's.
      WINDY_ADMIN_INGEST_URL: ${WINDY_ADMIN_INGEST_URL:-}
      WINDY_ADMIN_INGEST_TOKEN: ${WINDY_ADMIN_INGEST_TOKEN_ONBOARDING:-}
      # windy.panel.v1: /summary asks agent-roster for runner liveness (S2S,
      # same compose network, 800ms budget — failure just reads "unknown").
      AGENT_ROSTER_URL: http://agent-roster:8106
    depends_on:
      synapse:
        condition: service_healthy
      synapse-redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8101/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Directory (K3) — Contact discovery (hash lookup + search) ──
  directory:
    build:
      context: ./services
      dockerfile: directory/Dockerfile
      args:
        COMMIT_SHA: ${COMMIT_SHA:-}
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-}
    container_name: windy-directory
    ports:
      - "127.0.0.1:8102:8102"
      # host.docker.internal path for cross-stack S2S (account-server et al)
      - "172.17.0.1:8102:8102"
    volumes:
      - directory_data:/app/service/data
    environment:
      PORT: 8102
      DIRECTORY_PORT: 8102
      NODE_ENV: ${NODE_ENV:-development}
      WINDY_ACCOUNT_SERVER_URL: ${WINDY_ACCOUNT_SERVER_URL:-http://host.docker.internal:8098}
      WINDY_JWT_SECRET: ${WINDY_JWT_SECRET:-dev-secret-change-me}
      CHAT_API_TOKEN: ${CHAT_API_TOKEN:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
    depends_on:
      synapse:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8102/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Push Gateway (K6) — Matrix push → FCM/APNs ──
  push-gateway:
    build:
      context: ./services
      dockerfile: push-gateway/Dockerfile
      args:
        COMMIT_SHA: ${COMMIT_SHA:-}
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-}
    container_name: windy-push-gateway
    ports:
      - "127.0.0.1:8103:8103"
      # host.docker.internal path for cross-stack S2S (account-server et al)
      - "172.17.0.1:8103:8103"
    volumes:
      - push_gateway_data:/app/service/data
    environment:
      PORT: 8103
      PUSH_GATEWAY_PORT: 8103
      NODE_ENV: ${NODE_ENV:-development}
      WINDY_JWT_SECRET: ${WINDY_JWT_SECRET:-dev-secret-change-me}
      # JWKS endpoint for verifying user RS256 tokens. jwt-verify.js reads
      # WINDY_ACCOUNT_SERVER_URL and appends /.well-known/jwks.json; without
      # this every user-side push endpoint (register, test, mute, unmute,
      # prune) would 401 with "invalid algorithm" because JWKS fetch falls
      # back to localhost. Surfaced 2026-05-20 by the platform audit.
      WINDY_ACCOUNT_SERVER_URL: ${WINDY_ACCOUNT_SERVER_URL:-https://account.windyword.ai}
      CHAT_API_TOKEN: ${CHAT_API_TOKEN:-}
      # Variable name must match what fcm.js:47 reads (FIREBASE_SERVICE_ACCOUNT).
      # Was FCM_SERVICE_ACCOUNT_PATH — a stale name from before the FCM v1 SDK
      # adoption that silently broke FCM init for any dev with the var set.
      FIREBASE_SERVICE_ACCOUNT: ${FIREBASE_SERVICE_ACCOUNT:-}
      APNS_KEY_PATH: ${APNS_KEY_PATH:-}
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@windychat.ai}
      # Windy Admin messaging-core telemetry (ADR-WA-001). notify.js emits a
      # content-free chat.message_fanout per push-bus event; inert unless both
      # are set. Same platform-scoped write token the roster emitter uses.
      WINDY_ADMIN_INGEST_URL: ${WINDY_ADMIN_INGEST_URL:-}
      WINDY_ADMIN_INGEST_TOKEN: ${WINDY_ADMIN_INGEST_TOKEN:-}
    depends_on:
      synapse:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8103/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Backup (K8) — Encrypted cloud backup (via Windy Cloud API → Cloudflare R2) ──
  backup:
    build:
      context: ./services
      dockerfile: backup/Dockerfile
      args:
        COMMIT_SHA: ${COMMIT_SHA:-}
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-}
    container_name: windy-backup
    ports:
      - "127.0.0.1:8104:8104"
      # host.docker.internal path for cross-stack S2S (account-server et al)
      - "172.17.0.1:8104:8104"
    volumes:
      - backup_data:/app/service/data
    environment:
      PORT: 8104
      BACKUP_PORT: 8104
      NODE_ENV: ${NODE_ENV:-development}
      WINDY_JWT_SECRET: ${WINDY_JWT_SECRET:-dev-secret-change-me}
      # Required for RS256 JWKS verification — see push-gateway comment.
      # Backup endpoints were 100% 401 in prod before this var was wired.
      WINDY_ACCOUNT_SERVER_URL: ${WINDY_ACCOUNT_SERVER_URL:-https://account.windyword.ai}
      CHAT_API_TOKEN: ${CHAT_API_TOKEN:-}
      WINDY_CLOUD_URL: ${WINDY_CLOUD_URL:-}
      # Cloud kernel service token (X-Service-Token on archive uploads) —
      # same value as the kernel's SERVICE_TOKEN / account-server's
      # WINDY_CLOUD_SERVICE_TOKEN. Without it cloud backups fail closed.
      WINDY_CLOUD_SERVICE_TOKEN: ${WINDY_CLOUD_SERVICE_TOKEN:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-windy-chat-backups}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
    depends_on:
      synapse:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8104/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Social (K10) — Posts, follows, notifications, moderation, Eternitas webhooks ──
  social:
    build:
      context: ./services
      dockerfile: social/Dockerfile
      args:
        COMMIT_SHA: ${COMMIT_SHA:-}
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-}
    container_name: windy-social
    ports:
      - "127.0.0.1:8105:8105"
      # host.docker.internal path for cross-stack S2S (account-server et al)
      - "172.17.0.1:8105:8105"
    volumes:
      - social_data:/app/service/data
    environment:
      PORT: 8105
      NODE_ENV: ${NODE_ENV:-development}
      REDIS_URL: redis://synapse-redis:6379
      SYNAPSE_URL: http://synapse:8008
      WINDY_ACCOUNT_SERVER_URL: ${WINDY_ACCOUNT_SERVER_URL:-http://host.docker.internal:8098}
      WINDY_JWT_SECRET: ${WINDY_JWT_SECRET:-dev-secret-change-me}
      CHAT_API_TOKEN: ${CHAT_API_TOKEN:-}
      ETERNITAS_URL: ${ETERNITAS_URL:-https://api.eternitas.ai}
      ETERNITAS_WEBHOOK_SECRET: ${ETERNITAS_WEBHOOK_SECRET:-}
      SYNAPSE_ADMIN_TOKEN: ${SYNAPSE_ADMIN_TOKEN:-}
    depends_on:
      synapse:
        condition: service_healthy
      synapse-redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8105/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Translation Proxy (K9) — Bridge to Windy Pro translate-api ──
  translation:
    build:
      context: ./services
      dockerfile: translation/Dockerfile
    container_name: windy-translation
    ports:
      - "127.0.0.1:8106:8106"
      # host.docker.internal path for cross-stack S2S (account-server et al)
      - "172.17.0.1:8106:8106"
    volumes:
      - translation_data:/app/service/data
    environment:
      PORT: 8106
      NODE_ENV: ${NODE_ENV:-development}
      WINDY_TRANSLATE_URL: ${WINDY_TRANSLATE_URL:-http://host.docker.internal:9877}
      WINDY_ACCOUNT_SERVER_URL: ${WINDY_ACCOUNT_SERVER_URL:-http://host.docker.internal:8098}
      WINDY_JWT_SECRET: ${WINDY_JWT_SECRET:-dev-secret-change-me}
      CHAT_API_TOKEN: ${CHAT_API_TOKEN:-}
    depends_on:
      synapse:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8106/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Agent Roster (the multi-tenant Matrix listener) ──
  # Reads agent_credentials from onboarding's SQLite (shared volume),
  # spawns one AgentRunner per hatched agent. Each runner long-polls
  # /sync as the agent's Matrix user and replies via the LLM.
  # Without this, hatched agents' Matrix accounts are dead mailboxes —
  # the chat UI looks like ChatGPT but the agent literally can't read
  # incoming messages.
  agent-roster:
    build:
      context: ./services
      dockerfile: agent-roster/Dockerfile
      args:
        COMMIT_SHA: ${COMMIT_SHA:-}
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-}
    container_name: windy-agent-roster
    ports:
      - "127.0.0.1:8106:8106"
      # host.docker.internal path for cross-stack S2S (account-server et al)
      - "172.17.0.1:8106:8106"
    volumes:
      # Mount onboarding_data read-only so the roster can see
      # agent_credentials without risking schema writes from outside the
      # onboarding service.
      - onboarding_data:/onboarding-data:ro
    environment:
      PORT: 8106
      NODE_ENV: ${NODE_ENV:-development}
      ONBOARDING_DB_PATH: /onboarding-data/onboarding.db
      SYNAPSE_HOMESERVER: http://synapse:8008
      SYNAPSE_SERVER_NAME: ${SYNAPSE_SERVER_NAME:-chat.windychat.ai}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      # Day-5 mail tool: Resend SMTP relay token (windymail.ai verified
      # sending domain). Agents send "from" the operator's windymail.ai
      # address via this relay until windy-mail's delegation engine ships.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      # Pro account-server URL for service-to-service lookups
      # (mail-address-by-windy-id). Falls back to MAIL_ADDRESS_SEED
      # if CHAT_SERVICE_TOKEN isn't configured.
      WINDY_ACCOUNT_SERVER_URL: ${WINDY_ACCOUNT_SERVER_URL:-https://account.windyword.ai}
      CHAT_SERVICE_TOKEN: ${CHAT_SERVICE_TOKEN:-}
      # Seeded owner → mail-address map; useful in dev or before Pro
      # has the user's row. Comma-separated `<windy_id>=<addr>`.
      MAIL_ADDRESS_SEED: ${MAIL_ADDRESS_SEED:-}
      RECONCILE_INTERVAL_MS: ${RECONCILE_INTERVAL_MS:-30000}
      # One-soul yield (PR #111): where the roster reads the real-Fly
      # presence bit. Default matches the code; here for overridability.
      MIND_API_URL: ${MIND_API_URL:-https://api.windymind.ai}
      # ADR-056 §5 — midwife exhaustion-upsell. ETERNITAS_URL feeds the
      # clearance lookup (verified owners get the multiplied allowance);
      # the $1 line in the exhaustion message stays OFF until
      # VERIFIED_HATCH_UPSELL=1 flips at go-live together with
      # VERIFIED_HATCH_ENABLED on Eternitas.
      ETERNITAS_URL: ${ETERNITAS_URL:-https://api.eternitas.ai}
      # 2026-07-06 — roster web_search through windy-search. Both must be
      # set (plus ETERNITAS_URL above) or the tool simply isn't offered:
      # the roster fetches each agent's EPT from eternitas (platform key)
      # and searches windy-search as that agent (per-passport budget +
      # integrity attribution).
      WINDY_SEARCH_BASE_URL: ${WINDY_SEARCH_BASE_URL:-https://api.windysearch.com}
      ETERNITAS_PLATFORM_API_KEY: ${ETERNITAS_PLATFORM_API_KEY:-}
      UPGRADE_URL: ${UPGRADE_URL:-https://app.windyword.ai/upgrade}
      VERIFIED_HATCH_UPSELL: ${VERIFIED_HATCH_UPSELL:-}
      QUOTA_VERIFIED_MULTIPLIER: ${QUOTA_VERIFIED_MULTIPLIER:-2}
      # ADR-WA-001 — Windy Admin telemetry ledger (llm.call /
      # roster.exchange / roster.tool_call / roster.quota_denied).
      # Fire-and-forget; both unset = emitter is inert.
      WINDY_ADMIN_INGEST_URL: ${WINDY_ADMIN_INGEST_URL:-}
      WINDY_ADMIN_INGEST_TOKEN: ${WINDY_ADMIN_INGEST_TOKEN:-}
      # Phase 1.5 — the midwife's brain routes through Windy Mind
      # (MIND_API_URL above), model resolved from the named surface.
      # ROSTER_MIND_DISABLE=1 is the emergency killswitch back to
      # Groq-direct.
      MIND_CHAT_SURFACE: ${MIND_CHAT_SURFACE:-midwife}
      ROSTER_MIND_DISABLE: ${ROSTER_MIND_DISABLE:-}
    depends_on:
      onboarding:
        condition: service_healthy
      synapse:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8106/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          # 1 process, N asyncio fetch loops, ~10 MB per agent
          # comfortably fits in 256 MB for grandma-launch scale.
          memory: 256M

  # ── Hub (Hub Mode) — bridged-platform connection manager ──
  # Wraps the mautrix bridgev2 provisioning API (connect/disconnect
  # Telegram/Slack/WhatsApp/Discord) + owns connected_platforms state.
  # See exec-guide-hub-mode-2026-07-06.md. Port 8109 (8106 is
  # double-booked by translation/agent-roster).
  hub:
    build:
      context: ./services
      dockerfile: hub/Dockerfile
      args:
        COMMIT_SHA: ${COMMIT_SHA:-}
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-}
    container_name: windy-hub
    ports:
      - "127.0.0.1:8109:8109"
      # host.docker.internal path for cross-stack S2S (account-server et al)
      - "172.17.0.1:8109:8109"
    volumes:
      - hub_data:/app/service/data
      # Read-only onboarding DB for windy_identity_id → MXID resolution
      # (same pattern as agent-roster).
      - onboarding_data:/onboarding-data:ro
    environment:
      PORT: 8109
      NODE_ENV: ${NODE_ENV:-development}
      ONBOARDING_DB_PATH: /onboarding-data/onboarding.db
      SYNAPSE_SERVER_NAME: ${SYNAPSE_SERVER_NAME:-chat.windychat.ai}
      WINDY_ACCOUNT_SERVER_URL: ${WINDY_ACCOUNT_SERVER_URL:-http://host.docker.internal:8098}
      WINDY_JWT_SECRET: ${WINDY_JWT_SECRET:-dev-secret-change-me}
      CHAT_API_TOKEN: ${CHAT_API_TOKEN:-}
      # Per-bridge provisioning endpoints — a platform is exposed to
      # clients only when BOTH of its vars are set.
      HUB_BRIDGE_TELEGRAM_URL: ${HUB_BRIDGE_TELEGRAM_URL:-}
      HUB_BRIDGE_TELEGRAM_PROVISIONING_SECRET: ${HUB_BRIDGE_TELEGRAM_PROVISIONING_SECRET:-}
      HUB_BRIDGE_SLACK_URL: ${HUB_BRIDGE_SLACK_URL:-}
      HUB_BRIDGE_SLACK_PROVISIONING_SECRET: ${HUB_BRIDGE_SLACK_PROVISIONING_SECRET:-}
      HUB_BRIDGE_WHATSAPP_URL: ${HUB_BRIDGE_WHATSAPP_URL:-}
      HUB_BRIDGE_WHATSAPP_PROVISIONING_SECRET: ${HUB_BRIDGE_WHATSAPP_PROVISIONING_SECRET:-}
      HUB_BRIDGE_DISCORD_URL: ${HUB_BRIDGE_DISCORD_URL:-}
      HUB_BRIDGE_DISCORD_PROVISIONING_SECRET: ${HUB_BRIDGE_DISCORD_PROVISIONING_SECRET:-}
    depends_on:
      onboarding:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8109/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Telegram bridge (mautrix-telegram, bridgev2) — Hub Mode ──
  # Behind the `hub` compose profile: NOT started by a bare `up -d`.
  # First run generates /data/config.yaml; scripts/enable-hub-bridge.sh
  # patches config + installs the appservice registration, then a
  # (Grant-gated in prod) Synapse restart activates it.
  bridge-telegram:
    image: dock.mau.dev/mautrix/telegram:latest
    container_name: windy-bridge-telegram
    profiles: ["hub"]
    volumes:
      - bridge_telegram_data:/data
    restart: unless-stopped
    depends_on:
      synapse:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M


  # ── Slack bridge (mautrix-slack, bridgev2) — Hub Mode ──
  # Same pattern as bridge-telegram: `hub` profile, enable via
  # scripts/enable-hub-bridge.sh slack + (gated) Synapse restart.
  bridge-slack:
    image: dock.mau.dev/mautrix/slack:latest
    container_name: windy-bridge-slack
    profiles: ["hub"]
    volumes:
      - bridge_slack_data:/data
    restart: unless-stopped
    depends_on:
      synapse:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

  # ── WhatsApp bridge (mautrix-whatsapp, bridgev2) — Hub Mode ──
  # Same pattern as bridge-telegram: `hub` profile, enable via
  # scripts/enable-hub-bridge.sh whatsapp + (gated) Synapse restart.
  bridge-whatsapp:
    image: dock.mau.dev/mautrix/whatsapp:latest
    container_name: windy-bridge-whatsapp
    profiles: ["hub"]
    volumes:
      - bridge_whatsapp_data:/data
    restart: unless-stopped
    depends_on:
      synapse:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M


  # ── Discord bridge (mautrix-discord, LEGACY architecture) — Hub Mode ──
  # ⚠️ Pre-bridgev2: no generic provisioning API, so the in-app Connect
  # wizard can't drive it — users sign in by DMing @discordbot `login-qr`
  # in Windy Chat (QR posts as an image message). Migrates to the
  # bridgev2 flow when upstream ships the rewrite. User-token puppeting
  # is against Discord ToS (risk register: exec-guide-hub-mode §7).
  bridge-discord:
    image: dock.mau.dev/mautrix/discord:latest
    container_name: windy-bridge-discord
    profiles: ["hub"]
    volumes:
      - bridge_discord_data:/data
    restart: unless-stopped
    depends_on:
      synapse:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Rich Media (K4) — File upload, thumbnails, serving ──
  media:
    build:
      context: ./services
      dockerfile: media/Dockerfile
      args:
        COMMIT_SHA: ${COMMIT_SHA:-}
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-}
    container_name: windy-media
    ports:
      - "127.0.0.1:8107:8107"
      # host.docker.internal path for cross-stack S2S (account-server et al)
      - "172.17.0.1:8107:8107"
    volumes:
      - media_data:/app/service/data
    environment:
      PORT: 8107
      NODE_ENV: ${NODE_ENV:-development}
      MEDIA_STORAGE_PATH: /app/service/data/media
      WINDY_ACCOUNT_SERVER_URL: ${WINDY_ACCOUNT_SERVER_URL:-http://host.docker.internal:8098}
      WINDY_JWT_SECRET: ${WINDY_JWT_SECRET:-dev-secret-change-me}
      CHAT_API_TOKEN: ${CHAT_API_TOKEN:-}
    depends_on:
      synapse:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8107/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Call History (K5) — VoIP call metadata tracking ──
  call-history:
    build:
      context: ./services
      dockerfile: call-history/Dockerfile
      args:
        COMMIT_SHA: ${COMMIT_SHA:-}
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-}
    container_name: windy-call-history
    ports:
      - "127.0.0.1:8108:8108"
      # host.docker.internal path for cross-stack S2S (account-server et al)
      - "172.17.0.1:8108:8108"
    volumes:
      - call_history_data:/app/service/data
    environment:
      PORT: 8108
      NODE_ENV: ${NODE_ENV:-development}
      WINDY_ACCOUNT_SERVER_URL: ${WINDY_ACCOUNT_SERVER_URL:-http://host.docker.internal:8098}
      WINDY_JWT_SECRET: ${WINDY_JWT_SECRET:-dev-secret-change-me}
      CHAT_API_TOKEN: ${CHAT_API_TOKEN:-}
    depends_on:
      synapse:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8108/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  # ════════════════════════════════════════
  #  Web Frontend (windychat.ai)
  # ════════════════════════════════════════

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: windy-chat-web
    ports:
      - "3000:80"
    environment:
      VITE_MATRIX_HOMESERVER: https://chat.windychat.ai
      VITE_ACCOUNT_SERVER_URL: https://account.windyword.ai
      VITE_SOCIAL_API_URL: https://chat.windychat.ai/api/v1/social
      VITE_ETERNITAS_URL: https://api.eternitas.ai
      VITE_WINDY_WORD_WS: wss://windyword.ai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  synapse_data:
  synapse_pgdata:
  synapse_redis:
  nginx_certs:
  nginx_acme:
  onboarding_data:
  directory_data:
  push_gateway_data:
  backup_data:
  social_data:
  translation_data:
  media_data:
  call_history_data:
  hub_data:
  bridge_telegram_data:
  bridge_slack_data:
  bridge_whatsapp_data:
  bridge_discord_data:
