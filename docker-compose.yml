# ── Windy Chat Backend — Full Stack ──
# Usage: docker compose up
# Brings up Synapse + PostgreSQL + Redis + Coturn + all Node.js services + nginx

services:

  # ════════════════════════════════════════
  #  Infrastructure
  # ════════════════════════════════════════

  # ── PostgreSQL (Synapse database) ──
  synapse-db:
    image: postgres:16-alpine
    container_name: windy-synapse-db
    environment:
      POSTGRES_DB: synapse
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: ${SYNAPSE_DB_PASSWORD:-windy_dev_pg}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - synapse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Redis (Synapse workers + onboarding OTP store) ──
  synapse-redis:
    image: redis:7-alpine
    container_name: windy-synapse-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - synapse_redis:/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Coturn TURN Server (VoIP NAT traversal) ──
  coturn:
    image: coturn/coturn:latest
    container_name: windy-coturn
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"
      - "49152-49200:49152-49200/udp"
    volumes:
      - ./deploy/synapse/turnserver.conf:/etc/turnserver.conf:ro
    command: ["-c", "/etc/turnserver.conf"]
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  # ════════════════════════════════════════
  #  Synapse (Matrix Homeserver)
  # ════════════════════════════════════════

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: windy-synapse
    ports:
      - "8008:8008"
    environment:
      - SYNAPSE_CONFIG_PATH=/data/homeserver.yaml
      - SYNAPSE_DB_PASSWORD=${SYNAPSE_DB_PASSWORD:-windy_dev_pg}
    volumes:
      - synapse_data:/data
      - ./deploy/synapse/homeserver.yaml:/data/homeserver.yaml:ro
      - ./deploy/synapse/windy_registration.py:/data/modules/windy_registration.py:ro
    depends_on:
      synapse-db:
        condition: service_healthy
      synapse-redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://localhost:8008/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G

  # ════════════════════════════════════════
  #  Nginx (Reverse Proxy / TLS Termination)
  # ════════════════════════════════════════

  nginx:
    build:
      context: ./deploy
      dockerfile: nginx/Dockerfile
    container_name: windy-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/synapse/nginx.conf:/etc/nginx/conf.d/windy-chat.conf:ro
      - nginx_certs:/etc/nginx/certs:ro
      - nginx_acme:/var/www/certbot:ro
    depends_on:
      synapse:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M

  # ════════════════════════════════════════
  #  Node.js Microservices
  # ════════════════════════════════════════

  # ── Onboarding (K2) — Phone/email OTP, profile, QR pairing, Matrix provisioning ──
  onboarding:
    build:
      context: ./services
      dockerfile: onboarding/Dockerfile
    container_name: windy-onboarding
    ports:
      - "8101:8101"
    volumes:
      - onboarding_data:/app/service/data
    environment:
      PORT: 8101
      NODE_ENV: ${NODE_ENV:-development}
      REDIS_URL: redis://synapse-redis:6379
      SYNAPSE_URL: http://synapse:8008
      SYNAPSE_REGISTRATION_SECRET: ${SYNAPSE_REGISTRATION_SECRET:-windy_dev_reg_secret}
      WINDY_ACCOUNT_SERVER_URL: ${WINDY_ACCOUNT_SERVER_URL:-http://host.docker.internal:8098}
      WINDY_JWT_SECRET: ${WINDY_JWT_SECRET:-dev-secret-change-me}
      CHAT_API_TOKEN: ${CHAT_API_TOKEN:-}
      CHAT_SERVICE_TOKEN: ${CHAT_SERVICE_TOKEN:-}
      SYNAPSE_ADMIN_TOKEN: ${SYNAPSE_ADMIN_TOKEN:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-noreply@windychat.ai}
      OTP_EXPIRY_MINUTES: ${OTP_EXPIRY_MINUTES:-10}
    depends_on:
      synapse:
        condition: service_healthy
      synapse-redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8101/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Directory (K3) — Contact discovery (hash lookup + search) ──
  directory:
    build:
      context: ./services
      dockerfile: directory/Dockerfile
    container_name: windy-directory
    ports:
      - "8102:8102"
    volumes:
      - directory_data:/app/service/data
    environment:
      PORT: 8102
      DIRECTORY_PORT: 8102
      NODE_ENV: ${NODE_ENV:-development}
      WINDY_ACCOUNT_SERVER_URL: ${WINDY_ACCOUNT_SERVER_URL:-http://host.docker.internal:8098}
      WINDY_JWT_SECRET: ${WINDY_JWT_SECRET:-dev-secret-change-me}
      CHAT_API_TOKEN: ${CHAT_API_TOKEN:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
    depends_on:
      synapse:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8102/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Push Gateway (K6) — Matrix push → FCM/APNs ──
  push-gateway:
    build:
      context: ./services
      dockerfile: push-gateway/Dockerfile
    container_name: windy-push-gateway
    ports:
      - "8103:8103"
    volumes:
      - push_gateway_data:/app/service/data
    environment:
      PORT: 8103
      PUSH_GATEWAY_PORT: 8103
      NODE_ENV: ${NODE_ENV:-development}
      WINDY_JWT_SECRET: ${WINDY_JWT_SECRET:-dev-secret-change-me}
      CHAT_API_TOKEN: ${CHAT_API_TOKEN:-}
      FIREBASE_SERVICE_ACCOUNT: ${FCM_SERVICE_ACCOUNT_PATH:-}
      APNS_KEY_PATH: ${APNS_KEY_PATH:-}
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID:-com.windypro.chat}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@windychat.ai}
    depends_on:
      synapse:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8103/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Backup (K8) — Encrypted cloud backup (via Windy Cloud API → Cloudflare R2) ──
  backup:
    build:
      context: ./services
      dockerfile: backup/Dockerfile
    container_name: windy-backup
    ports:
      - "8104:8104"
    volumes:
      - backup_data:/app/service/data
    environment:
      PORT: 8104
      BACKUP_PORT: 8104
      NODE_ENV: ${NODE_ENV:-development}
      WINDY_JWT_SECRET: ${WINDY_JWT_SECRET:-dev-secret-change-me}
      CHAT_API_TOKEN: ${CHAT_API_TOKEN:-}
      WINDY_CLOUD_URL: ${WINDY_CLOUD_URL:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-windy-chat-backups}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
    depends_on:
      synapse:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8104/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Social (K10) — Posts, follows, notifications, moderation, Eternitas webhooks ──
  social:
    build:
      context: ./services
      dockerfile: social/Dockerfile
    container_name: windy-social
    ports:
      - "8105:8105"
    volumes:
      - social_data:/app/service/data
    environment:
      PORT: 8105
      NODE_ENV: ${NODE_ENV:-development}
      REDIS_URL: redis://synapse-redis:6379
      SYNAPSE_URL: http://synapse:8008
      WINDY_ACCOUNT_SERVER_URL: ${WINDY_ACCOUNT_SERVER_URL:-http://host.docker.internal:8098}
      WINDY_JWT_SECRET: ${WINDY_JWT_SECRET:-dev-secret-change-me}
      CHAT_API_TOKEN: ${CHAT_API_TOKEN:-}
      ETERNITAS_URL: ${ETERNITAS_URL:-https://api.eternitas.ai}
      ETERNITAS_WEBHOOK_SECRET: ${ETERNITAS_WEBHOOK_SECRET:-}
      SYNAPSE_ADMIN_TOKEN: ${SYNAPSE_ADMIN_TOKEN:-}
    depends_on:
      synapse:
        condition: service_healthy
      synapse-redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8105/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Translation Proxy (K9) — Bridge to Windy Pro translate-api ──
  translation:
    build:
      context: ./services
      dockerfile: translation/Dockerfile
    container_name: windy-translation
    ports:
      - "8106:8106"
    volumes:
      - translation_data:/app/service/data
    environment:
      PORT: 8106
      NODE_ENV: ${NODE_ENV:-development}
      WINDY_TRANSLATE_URL: ${WINDY_TRANSLATE_URL:-http://host.docker.internal:9877}
      WINDY_ACCOUNT_SERVER_URL: ${WINDY_ACCOUNT_SERVER_URL:-http://host.docker.internal:8098}
      WINDY_JWT_SECRET: ${WINDY_JWT_SECRET:-dev-secret-change-me}
      CHAT_API_TOKEN: ${CHAT_API_TOKEN:-}
    depends_on:
      synapse:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8106/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Rich Media (K4) — File upload, thumbnails, serving ──
  media:
    build:
      context: ./services
      dockerfile: media/Dockerfile
    container_name: windy-media
    ports:
      - "8107:8107"
    volumes:
      - media_data:/app/service/data
    environment:
      PORT: 8107
      NODE_ENV: ${NODE_ENV:-development}
      MEDIA_STORAGE_PATH: /app/service/data/media
      WINDY_ACCOUNT_SERVER_URL: ${WINDY_ACCOUNT_SERVER_URL:-http://host.docker.internal:8098}
      WINDY_JWT_SECRET: ${WINDY_JWT_SECRET:-dev-secret-change-me}
      CHAT_API_TOKEN: ${CHAT_API_TOKEN:-}
    depends_on:
      synapse:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8107/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Call History (K5) — VoIP call metadata tracking ──
  call-history:
    build:
      context: ./services
      dockerfile: call-history/Dockerfile
    container_name: windy-call-history
    ports:
      - "8108:8108"
    volumes:
      - call_history_data:/app/service/data
    environment:
      PORT: 8108
      NODE_ENV: ${NODE_ENV:-development}
      WINDY_ACCOUNT_SERVER_URL: ${WINDY_ACCOUNT_SERVER_URL:-http://host.docker.internal:8098}
      WINDY_JWT_SECRET: ${WINDY_JWT_SECRET:-dev-secret-change-me}
      CHAT_API_TOKEN: ${CHAT_API_TOKEN:-}
    depends_on:
      synapse:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8108/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  # ════════════════════════════════════════
  #  Web Frontend (windychat.ai)
  # ════════════════════════════════════════

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: windy-chat-web
    ports:
      - "3000:80"
    environment:
      VITE_MATRIX_HOMESERVER: https://chat.windychat.ai
      VITE_ACCOUNT_SERVER_URL: https://account.windyword.ai
      VITE_SOCIAL_API_URL: https://chat.windychat.ai/api/v1/social
      VITE_ETERNITAS_URL: https://api.eternitas.ai
      VITE_WINDY_WORD_WS: wss://windyword.ai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  synapse_data:
  synapse_pgdata:
  synapse_redis:
  nginx_certs:
  nginx_acme:
  onboarding_data:
  directory_data:
  push_gateway_data:
  backup_data:
  social_data:
  translation_data:
  media_data:
  call_history_data:
